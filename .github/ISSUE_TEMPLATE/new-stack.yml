name: 🏗️ Add New Stack
description: Propose adding support for a new technology stack
labels: ["new-stack", "contribution"]
body:
  - type: markdown
    attributes:
      value: |
        Before starting work on a new stack, open this issue so we can align on scope and avoid duplicate work.
  - type: input
    id: stack
    attributes:
      label: Stack name
      placeholder: "e.g. Ruby on Rails, Go + Gin, SvelteKit"
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why should this be included?
      description: Who uses this stack? What makes it worth adding to the shared template?
    validations:
      required: true
  - type: checkboxes
    id: files
    attributes:
      label: What will you contribute?
      options:
        - label: "`CLAUDE.md` — Claude Code context for this stack"
          required: true
        - label: "`CODING_STANDARDS.md` — conventions and forbidden patterns"
          required: true
        - label: "`DEPLOYMENT.md` — at least one deployment target"
          required: false
  - type: textarea
    id: experience
    attributes:
      label: Your experience with this stack
      description: Have you used this stack in production? What versions?
    validations:
      required: true
