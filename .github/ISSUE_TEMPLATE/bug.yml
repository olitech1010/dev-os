name: 🐛 Bug or Error in Docs
description: Something in the documentation is wrong or misleading
labels: ["bug", "documentation"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting an issue. Clear bug reports get fixed fast.
  - type: input
    id: file
    attributes:
      label: Which file?
      placeholder: "e.g. stacks/nextjs/CLAUDE.md"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What's wrong?
      description: Be specific. Quote the exact text if possible.
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: What should it say?
      description: If you know the correct information, share it.
